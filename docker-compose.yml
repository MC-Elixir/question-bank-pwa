name: question-bank

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend-data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
